<!DOCTYPE html>
<html>

<head>

<title>AI GitHub Repository Analyzer</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#0d1b2a;
color:white;
text-align:center;
padding:40px;
}

h1{
margin-bottom:30px;
}

input{
width:500px;
padding:12px;
border-radius:6px;
border:none;
font-size:16px;
}

button{
padding:12px 25px;
background:#2ecc71;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
font-size:16px;
margin-left:10px;
}

button:hover{
background:#27ae60;
}

.card{
background:#1b2a41;
margin:40px auto;
padding:30px;
width:850px;
border-radius:10px;
text-align:left;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
margin-top:20px;
}

.box{
background:#23395d;
padding:18px;
border-radius:8px;
font-size:15px;
}

.summary{
background:#23395d;
padding:20px;
border-radius:8px;
margin-top:20px;
line-height:1.7;
white-space:pre-line;
}

.spinner{
border:6px solid #f3f3f3;
border-top:6px solid #2ecc71;
border-radius:50%;
width:45px;
height:45px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.loader-box{
margin-top:40px;
}

</style>

</head>

<body>

<h1>AI GitHub Repository Analyzer</h1>

<input id="repo_url" placeholder="Paste GitHub repository URL">

<button onclick="analyze()">Analyze</button>

<div id="loader" class="loader-box" style="display:none">
<div class="spinner"></div>
<p>Analyzing repository...</p>
</div>

<div id="results"></div>

<script>

async function analyze(){

const url=document.getElementById("repo_url").value

if(!url){
alert("Please enter a GitHub repository URL")
return
}

document.getElementById("loader").style.display="block"
document.getElementById("results").innerHTML=""

const parts=url.split("/")

if(parts.length < 5){
alert("Invalid GitHub URL")
document.getElementById("loader").style.display="none"
return
}

const owner=parts[3]
const repo=parts[4]

const api=`/summarize/${owner}/${repo}`

try{

const res=await fetch(api)
const data=await res.json()

document.getElementById("loader").style.display="none"

if(data.error){
alert(data.error)
return
}

document.getElementById("results").innerHTML=`

<div class="card">

<h2>Repository Metrics</h2>

<div class="grid">

<div class="box"><b>Stars</b><br>${data.stars}</div>
<div class="box"><b>Forks</b><br>${data.forks}</div>
<div class="box"><b>Watchers</b><br>${data.watchers}</div>
<div class="box"><b>Open Issues</b><br>${data.open_issues}</div>
<div class="box"><b>Main Language</b><br>${data.language}</div>
<div class="box"><b>License</b><br>${data.license}</div>
<div class="box"><b>Last Updated</b><br>${data.last_updated}</div>
<div class="box"><b>Project Size</b><br>${data.size}</div>
<div class="box"><b>Contributors</b><br>${data.contributors}</div>
<div class="box"><b>Tech Stack</b><br>${data.tech_stack}</div>
<div class="box"><b>Architecture</b><br>${data.architecture}</div>
<div class="box"><b>Project Type</b><br>${data.project_type}</div>

</div>

<h2 style="margin-top:30px">Summary</h2>

<div class="summary">
${data.summary}
</div>

</div>

`

}
catch(error){
document.getElementById("loader").style.display="none"
alert("Error analyzing repository")
}

}

</script>
